apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yml
  - service.yml
  - certificate.yml
  - ingress.yml
  - subscription-deployment.yml
  - subscription-service.yml
  - subscription-configmap.yml

configMapGenerator:
  - name: vless-http-config
    files:
      - config/config.json
    options:
      disableNameSuffixHash: true
