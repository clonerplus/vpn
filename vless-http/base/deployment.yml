apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-http
  labels:
    app: vless-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vless-http
  template:
    metadata:
      labels:
        app: vless-http
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:latest
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - name: vless-cdn
              containerPort: 443
              protocol: TCP
            - name: vless-static
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/xray/config.json
              subPath: config.json
              readOnly: true
            - name: tls
              mountPath: /etc/xray/tls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: vless-cdn
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: vless-http-config
        - name: tls
          secret:
            secretName: vless-httpx-outi-tls
