apiVersion: v1
kind: Service
metadata:
  name: vless-http
  labels:
    app: vless-http
spec:
  type: NodePort
  ports:
    - name: vless-cdn
      port: 443
      targetPort: 443
      nodePort: 30443
      protocol: TCP
    - name: vless-static
      port: 8443
      targetPort: 8443
      nodePort: 30843
      protocol: TCP
  selector:
    app: vless-http
