apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-server
  labels:
    app: vless-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vless-server
  template:
    metadata:
      labels:
        app: vless-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: vless
          image: ghcr.io/outi-ops/vpn-server:latest
          args:
            - "--config"
            - "/etc/vpn-server/config.json"
          ports:
            - name: vless
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/vpn-server
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: vless
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: vless-config
