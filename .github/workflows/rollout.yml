name: Rollout Restart

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to restart'
        required: true
        default: 'vless-server'
        type: choice
        options:
          - vless-server
          - vless-reality
          - ss-server
          - vpn-gateway
          - vpn-api

jobs:
  rollout:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Rollout restart ${{ inputs.app }}
        run: kubectl rollout restart deployment/${{ inputs.app }} -n vless
