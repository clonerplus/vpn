name: PR Validation & Test Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - 'vless-http/**'
      - 'vpn-manager/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate kustomize builds
        run: |
          for dir in vless-http vpn-manager; do
            if [ -d "$dir/overlays/stage" ]; then
              echo "Validating $dir..."
              kubectl kustomize "$dir/overlays/stage"
            fi
          done

  build-test:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'vpn-manager/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build vpn-manager
        run: CGO_ENABLED=1 go build -o vpn-manager-bin ./cmd/vpn-manager

      - name: Run basic test
        run: ./vpn-manager-bin -config /dev/null &
        sleep 2
        curl -sf http://localhost:8080/health || exit 1
        kill %1

  deploy-test:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to test namespace
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONF }}
        with:
          args: apply -k vpn-manager/overlays/stage -n vpn-test
