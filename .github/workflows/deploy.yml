name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'vless-http/**'
      - 'vpn-manager/**'
  workflow_dispatch:

jobs:
  deploy-vless-http:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'vless-http/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy vless-http to stage
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONF }}
        with:
          args: apply -k vless-http/overlays/stage

  deploy-vpn-manager:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'vpn-manager/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/outi-ops/vpn-manager:latest

      - name: Deploy vpn-manager to stage
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONF }}
        with:
          args: apply -k vpn-manager/overlays/stage
