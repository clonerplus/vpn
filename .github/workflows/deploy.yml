name: Deploy VPN Services

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - vless-server
          - vless-reality
          - ss-server
          - vpn-gateway
          - vpn-api

jobs:
  stage-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONF }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create ghcr.io pull secret
        run: |
          kubectl create namespace vless --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --namespace=vless \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Determine apps to deploy
        id: apps
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected="${{ inputs.app }}"
            if [[ "$selected" == "all" ]]; then
              echo "list=vless-server vless-reality ss-server vpn-gateway vpn-api" >> $GITHUB_OUTPUT
            else
              echo "list=$selected" >> $GITHUB_OUTPUT
            fi
          else
            echo "list=vless-server vless-reality ss-server vpn-gateway vpn-api" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to stage
        run: |
          for app in ${{ steps.apps.outputs.list }}; do
            echo "Deploying $app..."
            kubectl apply -k $app/overlays/stage
          done
