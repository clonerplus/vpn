apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vless-reality-restart
  namespace: vpn
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vless-reality-restart
  namespace: vpn
subjects:
  - kind: ServiceAccount
    name: default
    namespace: vpn
roleRef:
  kind: Role
  name: vless-reality-restart
  apiGroup: rbac.authorization.k8s.io
