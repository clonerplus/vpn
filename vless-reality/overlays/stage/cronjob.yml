apiVersion: batch/v1
kind: CronJob
metadata:
  name: vless-reality-restart
  namespace: vpn
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - kubectl rollout restart deployment/vless-reality -n vpn
          restartPolicy: Never
