apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-reality
  labels:
    app: vless-reality
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vless-reality
  template:
    metadata:
      labels:
        app: vless-reality
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 30
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:latest
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - name: vless-reality
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/xray/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: vless-reality
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: vless-reality
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: vless-reality-config
