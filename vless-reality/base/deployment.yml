apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-reality
  labels:
    app: vless-reality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vless-reality
  template:
    metadata:
      labels:
        app: vless-reality
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:latest
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: config
              mountPath: /etc/xray/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - pgrep
                - xray
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: vless-reality-config
