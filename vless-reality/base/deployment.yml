apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-reality
  labels:
    app: vless-reality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vless-reality
  template:
    metadata:
      labels:
        app: vless-reality
    spec:
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:1.8.24
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - name: reality
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/xray
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: vless-reality-config
