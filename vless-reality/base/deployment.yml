apiVersion: apps/v1
kind: Deployment
metadata:
  name: vless-reality
  labels:
    app: vless-reality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vless-reality
  template:
    metadata:
      labels:
        app: vless-reality
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:latest
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - name: vless-reality
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/xray/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: vless-reality-config
