apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vless-reality
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: static.outi.ir
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vless-reality
                port:
                  number: 443
