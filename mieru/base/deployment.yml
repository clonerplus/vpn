apiVersion: apps/v1
kind: Deployment
metadata:
  name: mieru
  labels:
    app: mieru
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mieru
  template:
    metadata:
      labels:
        app: mieru
    spec:
      initContainers:
        - name: download-mita
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache python3 wget
              wget -q https://github.com/enfein/mieru/releases/download/v3.34.1/mita_3.34.1_amd64.deb -O /tmp/mita.deb
              python3 -c "
              import arfile, tarfile, io, os
              deb = arfile.open('/tmp/mita.deb')
              for name in deb.getnames():
                  if name.startswith('data.tar'):
                      data = tarfile.open(fileobj=io.BytesIO(deb.extractfile(name).read()))
                      for m in data.getmembers():
                          if m.name.endswith('/mita'):
                              f = data.extractfile(m)
                              open('/shared/mita', 'wb').write(f.read())
                              os.chmod('/shared/mita', 0o755)
                              break
              "
          volumeMounts:
            - name: mita-bin
              mountPath: /shared
        - name: apply-config
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              cp /shared/mita /usr/local/bin/mita
              chmod +x /usr/local/bin/mita
              cp /config-src/config.json /etc/mita/config.json
              mita apply config /etc/mita/config.json
          volumeMounts:
            - name: mita-bin
              mountPath: /shared
              readOnly: true
            - name: config-src
              mountPath: /config-src/config.json
              subPath: config.json
              readOnly: true
            - name: mita-data
              mountPath: /etc/mita
      containers:
        - name: mita
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              cp /shared/mita /usr/local/bin/mita
              chmod +x /usr/local/bin/mita
              mita run
          ports:
            - name: mieru-tcp
              containerPort: 443
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mita status | grep -q RUNNING
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mita status | grep -q RUNNING
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: mita-bin
              mountPath: /shared
              readOnly: true
            - name: mita-data
              mountPath: /etc/mita
            - name: mita-run
              mountPath: /var/run/mita
      volumes:
        - name: mita-bin
          emptyDir: {}
        - name: config-src
          configMap:
            name: mieru-config
        - name: mita-data
          emptyDir: {}
        - name: mita-run
          emptyDir: {}
