apiVersion: apps/v1
kind: Deployment
metadata:
  name: mieru
  labels:
    app: mieru
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mieru
  template:
    metadata:
      labels:
        app: mieru
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: apply-config
          image: ghcr.io/clonerplus/vpn/mita:latest
          command:
            - /bin/sh
            - -c
            - cp /tmp/config.json /etc/mita/config.json && mita apply config /etc/mita/config.json
          volumeMounts:
            - name: config-src
              mountPath: /tmp/config.json
              subPath: config.json
              readOnly: true
            - name: mita-data
              mountPath: /etc/mita
          securityContext:
            runAsUser: 0
      containers:
        - name: mita
          image: ghcr.io/clonerplus/vpn/mita:latest
          command: ["/usr/local/bin/mita", "run"]
          ports:
            - name: mieru-tcp
              containerPort: 443
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mita status | grep -q RUNNING
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mita status | grep -q RUNNING
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: mita-data
              mountPath: /etc/mita
            - name: mita-run
              mountPath: /var/run/mita
      volumes:
        - name: config-src
          configMap:
            name: mieru-config
        - name: mita-data
          emptyDir: {}
        - name: mita-run
          emptyDir: {}
